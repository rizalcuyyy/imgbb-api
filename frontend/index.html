<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galeri Imgbb + KV</title>
<style>
  body { font-family: sans-serif; padding: 10px; }
  #gallery img { width: 200px; margin: 5px; display: inline-block; }
  #uploadForm { margin-bottom: 20px; }
</style>
</head>
<body>
<h1>Upload Gambar</h1>
<form id="uploadForm" enctype="multipart/form-data">
  <input type="file" name="file" required>
  <button type="submit">Upload</button>
</form>

<h2>Galeri</h2>
<div id="gallery"></div>
<button id="loadMore">Load More</button>

<script>
let page = 0, perPage = 10

async function loadGallery() {
  const res = await fetch("/gallery")
  const images = await res.json()
  const container = document.getElementById("gallery")
  const slice = images.slice(page*perPage, (page+1)*perPage)
  for (const img of slice) {
    const el = document.createElement("img")
    el.src = `/img/${img.id}`
    el.loading = "lazy"
    container.appendChild(el)
  }
  page++
}

document.getElementById("loadMore").addEventListener("click", loadGallery)
loadGallery()

document.getElementById("uploadForm").addEventListener("submit", async e => {
  e.preventDefault()
  const form = e.target
  const data = new FormData(form)

  const res = await fetch("/upload", { method: "POST", body: data })
  const json = await res.json()
  console.log("Uploaded:", json)

  const container = document.getElementById("gallery")
  const el = document.createElement("img")
  el.src = `/img/${json.id}`
  el.loading = "lazy"
  container.prepend(el)
})
</script>
</body>
</html>
